---
- name: Skip endpoint transport failover checks for non-xp2p WireGuard transports
  ansible.builtin.meta: end_host
  when: resolved_wireguard_network.preferred_transport.type | default('') != 'xp2p'

- name: Skip endpoint transport failover checks when failover is disabled
  ansible.builtin.meta: end_host
  when: not (resolved_wireguard_network.preferred_transport.failover.enabled | default(false) | bool)

- name: Skip endpoint route failover checks on the endpoint host
  ansible.builtin.meta: end_host
  when: resolved_wireguard_network.is_hub | bool

- name: Select WireGuard endpoint failover ping addresses
  ansible.builtin.set_fact:
    wireguard_endpoint_failover_ping_addresses:
      - "{{ resolved_wireguard_network.hub_address | regex_replace('/.*$', '') }}"

- name: Collect endpoint transport failover state
  ansible.builtin.raw: |
    set +e
    rc=0
    endpoint_host='{{ resolved_wireguard_network.endpoint.host }}'
    endpoint_port='{{ resolved_wireguard_network.endpoint.port }}'
    transport_interface='{{ resolved_wireguard_network.preferred_transport.interface }}'
    transport_tag='{{ resolved_wireguard_network.preferred_transport.outbound_tag }}'
    route_section='{{ resolved_wireguard_network.preferred_transport.route.section }}'
    check_uci_value() {
      key="$1"
      expected="$2"
      actual="$(uci -q get "$key" 2>/dev/null || true)"
      if [ "$actual" != "$expected" ]; then
        echo "UCI_MISMATCH key=${key} expected=${expected} actual=${actual:-<missing>}"
        rc=1
      fi
    }
    echo '### xp2p client service status'
    xp2p client service status || rc=1
    echo '### xp2p client state'
    state="$(xp2p client state 2>&1)"
    state_rc="$?"
    printf '%s\n' "$state"
    [ "$state_rc" -eq 0 ] || rc=1
    echo '### xp2pc interface'
    ip link show "$transport_interface" || rc=1
    ip addr show dev "$transport_interface" || rc=1
    echo '### endpoint route uci'
    uci -q show "network.${route_section}" || rc=1
    check_uci_value "network.${route_section}" route
    check_uci_value "network.${route_section}.interface" "$transport_interface"
    check_uci_value "network.${route_section}.target" "$endpoint_host"
    check_uci_value "network.${route_section}.netmask" 255.255.255.255
    route_disabled="$(uci -q get "network.${route_section}.disabled" 2>/dev/null || true)"
    echo "ROUTE_DISABLED=${route_disabled:-0}"
    echo '### endpoint route get'
    route_get="$(ip route get "$endpoint_host" 2>&1)"
    route_get_rc="$?"
    printf '%s\n' "$route_get"
    [ "$route_get_rc" -eq 0 ] || rc=1
    echo '### wireguard'
    wg show || rc=1
    echo '### hub connectivity'
    {% for address in wireguard_endpoint_failover_ping_addresses %}
    ping -c 3 {{ address }} || rc=1
    {% endfor %}
    if ip link show "$transport_interface" >/dev/null 2>&1 &&
       printf '%s\n' "$state" | grep -F "$transport_tag" | grep -Eq '(^|[[:space:]])alive([[:space:]]|$)'; then
      xp2p_status=alive
    elif printf '%s\n' "$state" | grep -F "$transport_tag" | grep -Eq '(^|[[:space:]])dead([[:space:]]|$)' ||
         ! printf '%s\n' "$state" | grep -F "$transport_tag" | grep -Eq '(^|[[:space:]])alive([[:space:]]|$)'; then
      xp2p_status=dead
    else
      xp2p_status=unknown
      rc=1
    fi
    echo "XP2P_STATUS=$xp2p_status"
    if [ "$xp2p_status" = alive ]; then
      if [ -z "$route_disabled" ] && printf '%s\n' "$route_get" | grep -q "dev $transport_interface"; then
        echo 'ROUTE_EXPECTATION=ok'
      else
        echo 'ROUTE_EXPECTATION=failed_alive_should_use_xp2pc'
        rc=1
      fi
    elif [ "$xp2p_status" = dead ]; then
      if [ "$route_disabled" = 1 ] && ! printf '%s\n' "$route_get" | grep -q "dev $transport_interface"; then
        echo 'ROUTE_EXPECTATION=ok'
      else
        echo 'ROUTE_EXPECTATION=failed_dead_should_use_public_fallback'
        rc=1
      fi
    fi
    echo "ENDPOINT=${endpoint_host}:${endpoint_port}"
    exit "$rc"
  register: xp2p_failover_health
  changed_when: false

- name: Validate endpoint transport failover state
  ansible.builtin.assert:
    that:
      - "'XP2P_STATUS=alive' in xp2p_failover_health.stdout or 'XP2P_STATUS=dead' in xp2p_failover_health.stdout"
      - "'ROUTE_EXPECTATION=ok' in xp2p_failover_health.stdout"
    fail_msg: "WireGuard endpoint transport failover healthcheck failed on {{ inventory_hostname }}."
