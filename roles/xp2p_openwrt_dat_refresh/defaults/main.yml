---
xp2p_dat_refresh_cache_dir: "{{ playbook_dir }}/../../.cache/xp2p-dat-refresh"
xp2p_dat_refresh_force: false
xp2p_dat_refresh_max_age_days: 14
xp2p_dat_refresh_verify_socks: false
xp2p_dat_refresh_restart_service: false
xp2p_dat_refresh_service_name: xp2p-client
xp2p_dat_refresh_transfer_timeout_seconds: 300
xp2p_dat_refresh_ssh_extra_args:
  - -o
  - StrictHostKeyChecking=accept-new
xp2p_dat_refresh_scp_extra_args:
  - -O
  - -o
  - StrictHostKeyChecking=accept-new
