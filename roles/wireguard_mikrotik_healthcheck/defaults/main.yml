---
mikrotik_wireguard_enabled: true
mikrotik_wireguard_site_id: "{{ wireguard_site_id | default('') }}"
mikrotik_wireguard_managed_comment_prefix: "infra-ansible:wireguard"
mikrotik_wireguard_persistent_keepalive: 25
mikrotik_wireguard_safe_mode_enabled: false
mikrotik_wireguard_safe_mode_required: false
mikrotik_wireguard_unsafe_apply_without_safe_mode: true
mikrotik_wireguard_safe_mode_take_command: "/safe-mode/take on-error=abort"
mikrotik_wireguard_safe_mode_release_command: "/safe-mode/release"
mikrotik_wireguard_safe_mode_unroll_command: "/safe-mode/unroll"
mikrotik_wireguard_verify_reachability_enabled: false
mikrotik_wireguard_verify_ping_count: 3
