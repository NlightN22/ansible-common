---
- name: Validate selected WireGuard member context
  ansible.builtin.assert:
    that:
      - resolved_architecture is defined
      - resolved_architecture is mapping
      - resolved_wireguard_network is defined
      - resolved_wireguard_network is mapping
      - resolved_wireguard_network.current_member is mapping
      - not (wireguard_member_context_require_active | bool) or resolved_wireguard_network.current_member.active | default(true) | bool
    fail_msg: >-
      Host {{ inventory_hostname }} is not an active member of WireGuard
      network {{ network_id | default(resolved_wireguard_network.id | default('unknown')) }}.

- name: Select WireGuard member platform from model
  ansible.builtin.set_fact:
    wireguard_member_platform: >-
      {{
        resolved_wireguard_network.current_member.platform
        | default('')
      }}

- name: Validate WireGuard member platform
  ansible.builtin.assert:
    that:
      - wireguard_member_platform | length > 0
    fail_msg: >-
      WireGuard member {{ inventory_hostname }} has no platform. Set
      platform on the selected WireGuard hub/peer member, or use
      architecture_model.nodes.{{ inventory_hostname }}.platform only as a
      host metadata fallback.
