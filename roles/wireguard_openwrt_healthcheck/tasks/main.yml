---
- name: Validate selected WireGuard OpenWrt network
  ansible.builtin.assert:
    that:
      - resolved_wireguard_network is defined
      - resolved_wireguard_network is mapping
      - resolved_wireguard_network.current_member is mapping
      - resolved_wireguard_network.current_member.active | default(true) | bool
      - resolved_wireguard_network.current_member.platform | default('') == 'openwrt'
      - resolved_wireguard_network.interface_name is defined
      - resolved_wireguard_network.endpoint.host is defined
      - resolved_wireguard_network.hub_allowed_ips | length > 0
    fail_msg: >-
      Host {{ inventory_hostname }} is not an active OpenWrt member of
      WireGuard network {{ network_id | default(resolved_wireguard_network.id | default('unknown')) }}.

- name: Select WireGuard OpenWrt healthcheck targets
  ansible.builtin.set_fact:
    wireguard_openwrt_expected_peers: "{{ resolved_wireguard_network | ansible_common.core.wireguard_expected_peers }}"
    wireguard_openwrt_expected_route_targets: "{{ resolved_wireguard_network | ansible_common.core.wireguard_expected_route_targets }}"
    wireguard_openwrt_health_ping_addresses: >-
      {{ resolved_wireguard_network | ansible_common.core.wireguard_expected_ping_targets }}

- name: Check OpenWrt WireGuard and route state
  ansible.builtin.raw: |
    set +e
    rc=0
    now="$(date +%s)"
    ping_with_retry() {
      target="$1"
      attempt=1
      while [ "$attempt" -le 6 ]; do
        if ping -c 3 "$target"; then
          return 0
        fi
        attempt=$((attempt + 1))
        sleep 5
      done
      return 1
    }
    check_uci_value() {
      key="$1"
      expected="$2"
      actual="$(uci -q get "$key" 2>/dev/null || true)"
      if [ "$actual" != "$expected" ]; then
        echo "UCI_MISMATCH key=${key} expected=${expected} actual=${actual:-<missing>}"
        rc=1
      fi
    }
    echo "### now ${now}"
    echo '### interface'
    ip link show dev {{ resolved_wireguard_network.interface_name }} || rc=1
    echo '### dump'
    wg show {{ resolved_wireguard_network.interface_name }} dump || rc=1
    echo '### endpoint route'
    ip route get {{ resolved_wireguard_network.endpoint.host }} || rc=1
    {% for route_target in wireguard_openwrt_expected_route_targets %}
    echo '### route {{ route_target }}'
    ip route get {{ route_target | regex_replace('/.*$', '') }} || rc=1
    {% endfor %}
    {% if wireguard_openwrt_healthcheck_extended_ping_enabled | bool %}
    {% for address in wireguard_openwrt_health_ping_addresses %}
    echo '### ping {{ address }}'
    ping_with_retry {{ address }} || rc=1
    {% endfor %}
    {% endif %}
    echo '### endpoint route uci'
    {% if not (resolved_wireguard_network.is_hub | bool) %}
    {% if resolved_wireguard_network.effective_transport.interface is defined and resolved_wireguard_network.effective_transport.route is defined and resolved_wireguard_network.effective_transport.route.section is defined %}
    check_uci_value network.{{ resolved_wireguard_network.effective_transport.route.section }} route
    check_uci_value network.{{ resolved_wireguard_network.effective_transport.route.section }}.interface {{ resolved_wireguard_network.effective_transport.interface }}
    check_uci_value network.{{ resolved_wireguard_network.effective_transport.route.section }}.target {{ resolved_wireguard_network.endpoint.host }}
    check_uci_value network.{{ resolved_wireguard_network.effective_transport.route.section }}.netmask 255.255.255.255
    uci -q get network.{{ resolved_wireguard_network.effective_transport.route.section }}.disabled || true
    {% else %}
    echo 'unmanaged endpoint route'
    {% endif %}
    {% else %}
    echo 'skipped on hub'
    {% endif %}
    echo '### WireGuard route uci'
    {% if not (resolved_wireguard_network.is_hub | bool) %}
    {% for target in resolved_wireguard_network.hub_allowed_ips %}
    check_uci_value network.{{ resolved_wireguard_network.id }}_wg_hub_route_{{ loop.index }} route
    check_uci_value network.{{ resolved_wireguard_network.id }}_wg_hub_route_{{ loop.index }}.interface {{ resolved_wireguard_network.interface_name }}
    check_uci_value network.{{ resolved_wireguard_network.id }}_wg_hub_route_{{ loop.index }}.target {{ target | regex_replace('/32$', '') }}
    {% if target is search('/32$') %}
    check_uci_value network.{{ resolved_wireguard_network.id }}_wg_hub_route_{{ loop.index }}.netmask 255.255.255.255
    {% elif target is search('/24$') %}
    check_uci_value network.{{ resolved_wireguard_network.id }}_wg_hub_route_{{ loop.index }}.netmask 255.255.255.0
    {% elif target is search('/23$') %}
    check_uci_value network.{{ resolved_wireguard_network.id }}_wg_hub_route_{{ loop.index }}.netmask 255.255.254.0
    {% else %}
    echo 'Unsupported route prefix in {{ target }}' >&2
    rc=1
    {% endif %}
    {% endfor %}
    {% else %}
    echo 'skipped on hub'
    {% endif %}
    {% if wireguard_openwrt_healthcheck_firewall_enabled | bool %}
    echo '### firewall'
    uci show firewall | grep -E '{{ resolved_wireguard_network.interface_name }}' || true
    check_uci_value firewall.wg_{{ resolved_wireguard_network.id }} zone
    check_uci_value firewall.wg_{{ resolved_wireguard_network.id }}.name {{ resolved_wireguard_network.interface_name }}
    check_uci_value firewall.wg_{{ resolved_wireguard_network.id }}.input ACCEPT
    check_uci_value firewall.wg_{{ resolved_wireguard_network.id }}.output ACCEPT
    {% if resolved_wireguard_network.current_member.lan_cidr is defined %}
    check_uci_value firewall.wg_{{ resolved_wireguard_network.id }}_to_lan_masq nat
    check_uci_value firewall.wg_{{ resolved_wireguard_network.id }}_to_lan_masq.name {{ resolved_wireguard_network.interface_name }}-to-lan-masquerade
    check_uci_value firewall.wg_{{ resolved_wireguard_network.id }}_to_lan_masq.family ipv4
    check_uci_value firewall.wg_{{ resolved_wireguard_network.id }}_to_lan_masq.src lan
    check_uci_value firewall.wg_{{ resolved_wireguard_network.id }}_to_lan_masq.src_ip {{ resolved_wireguard_network.network_cidr }}
    check_uci_value firewall.wg_{{ resolved_wireguard_network.id }}_to_lan_masq.target MASQUERADE
    {% endif %}
    {% endif %}
    echo '### xp2p redirects'
    xp2p client redirect list || true
    exit "$rc"
  register: wireguard_openwrt_health
  changed_when: false

- name: Validate OpenWrt WireGuard route state
  ansible.builtin.assert:
    that:
      - "'### interface' in wireguard_openwrt_health.stdout"
      - "'### dump' in wireguard_openwrt_health.stdout"
      - resolved_wireguard_network.is_hub | bool or 'dev ' ~ resolved_wireguard_network.interface_name in wireguard_openwrt_health.stdout
      - resolved_wireguard_network.is_hub | bool or resolved_wireguard_network.endpoint.host in wireguard_openwrt_health.stdout
    fail_msg: "WireGuard OpenWrt healthcheck failed on {{ inventory_hostname }}."

- name: Validate OpenWrt WireGuard peers
  ansible.builtin.assert:
    that:
      - "item.public_key in wireguard_openwrt_health.stdout"
      - >-
        item.allowed_ips
        | reject('in', wireguard_openwrt_health.stdout)
        | list
        | length == 0
    fail_msg: "OpenWrt WireGuard peer state is incomplete for {{ item.host | default(item.public_key) }} on {{ inventory_hostname }}."
  loop: "{{ wireguard_openwrt_expected_peers }}"
  loop_control:
    label: "{{ item.host | default(item.public_key | default('unknown-peer')) }}"
  no_log: true

- name: Validate OpenWrt WireGuard latest handshakes
  ansible.builtin.assert:
    that:
      - >-
        (
          wireguard_openwrt_health.stdout
          | regex_search('(?m)^' ~ (item.public_key | regex_escape()) ~ '\t[^\t]*\t[^\t]*\t[^\t]*\t([0-9]+)\t', '\1')
          | first
          | default('0')
          | int
        ) > 0
      - >-
        (
          (
            wireguard_openwrt_health.stdout
            | regex_search('(?m)^### now ([0-9]+)$', '\1')
            | first
            | default('0')
            | int
          )
          -
          (
            wireguard_openwrt_health.stdout
            | regex_search('(?m)^' ~ (item.public_key | regex_escape()) ~ '\t[^\t]*\t[^\t]*\t[^\t]*\t([0-9]+)\t', '\1')
            | first
            | default('0')
            | int
          )
        ) <= wireguard_openwrt_healthcheck_handshake_max_age_seconds | int
    fail_msg: "OpenWrt WireGuard latest handshake is stale for {{ item.host | default(item.public_key) }} on {{ inventory_hostname }}."
  loop: "{{ wireguard_openwrt_expected_peers }}"
  loop_control:
    label: "{{ item.host | default(item.public_key | default('unknown-peer')) }}"
  when: wireguard_openwrt_healthcheck_handshake_enabled | bool
  no_log: true
