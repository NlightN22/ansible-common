---
- name: Validate XP2P dat refresh cache model
  ansible.builtin.assert:
    that:
      - xp2p_dat_refresh_model.id | default('') | length > 0
      - xp2p_dat_refresh_model.remote_dat_dir | default('') | length > 0
      - xp2p_dat_refresh_model.dat_files | default([]) | length > 0
    fail_msg: "XP2P dat refresh model must define id, remote_dat_dir, and dat_files."
    quiet: true

- name: Ensure local XP2P dat cache exists
  ansible.builtin.file:
    path: "{{ xp2p_dat_refresh_cache_dir }}/{{ xp2p_dat_refresh_model.id }}"
    state: directory
    mode: "0755"

- name: Collect local XP2P dat cache state
  ansible.builtin.stat:
    path: "{{ xp2p_dat_refresh_cache_dir }}/{{ xp2p_dat_refresh_model.id }}/{{ item.name }}"
    get_checksum: false
    get_mime: false
  register: xp2p_dat_refresh_local_cache_before
  loop: "{{ xp2p_dat_refresh_model.dat_files }}"
  loop_control:
    label: "{{ item.name }}"

- name: Download XP2P dat files to control host
  ansible.builtin.get_url:
    url: "{{ item.item.url }}"
    dest: "{{ xp2p_dat_refresh_cache_dir }}/{{ xp2p_dat_refresh_model.id }}/{{ item.item.name }}"
    mode: "0644"
    timeout: 30
    force: "{{ xp2p_dat_refresh_force | bool }}"
  loop: "{{ xp2p_dat_refresh_local_cache_before.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  vars:
    xp2p_dat_refresh_cache_max_age_seconds: >-
      {{
        (
          xp2p_dat_refresh_model.dat_max_age_days
          | default(xp2p_dat_refresh_max_age_days)
          | int
        ) * 86400
      }}
  when: >-
    xp2p_dat_refresh_force | bool
    or not item.stat.exists
    or (item.stat.size | int) <= 0
    or ((lookup('pipe', 'date +%s') | int) - (item.stat.mtime | int)) > (xp2p_dat_refresh_cache_max_age_seconds | int)

- name: Validate local XP2P dat files
  ansible.builtin.stat:
    path: "{{ xp2p_dat_refresh_cache_dir }}/{{ xp2p_dat_refresh_model.id }}/{{ item.name }}"
    get_checksum: false
    get_mime: false
  register: xp2p_dat_refresh_local_dat
  loop: "{{ xp2p_dat_refresh_model.dat_files }}"
  loop_control:
    label: "{{ item.name }}"

- name: Require non-empty local XP2P dat files
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.size | int > 0
    fail_msg: "Local XP2P dat file {{ item.item.name }} is missing or empty."
    quiet: true
  loop: "{{ xp2p_dat_refresh_local_dat.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
