---
- name: Validate XP2P dat refresh sync model
  ansible.builtin.assert:
    that:
      - xp2p_dat_refresh_model.id | default('') | length > 0
      - xp2p_dat_refresh_model.remote_dat_dir | default('') | length > 0
      - xp2p_dat_refresh_model.dat_files | default([]) | length > 0
    fail_msg: "XP2P dat refresh model must define id, remote_dat_dir, and dat_files."
    quiet: true

- name: Collect local XP2P dat file state
  ansible.builtin.stat:
    path: "{{ xp2p_dat_refresh_cache_dir }}/{{ xp2p_dat_refresh_model.id }}/{{ item.name }}"
    checksum_algorithm: md5
    get_checksum: true
    get_mime: false
  register: xp2p_dat_refresh_local_dat_sync
  loop: "{{ xp2p_dat_refresh_model.dat_files }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  run_once: true

- name: Require non-empty cached XP2P dat files
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.size | int > 0
    fail_msg: "Cached XP2P dat file {{ item.item.name }} is missing or empty."
    quiet: true
  loop: "{{ xp2p_dat_refresh_local_dat_sync.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  run_once: true

- name: Ensure remote XP2P dat directory exists
  ansible.builtin.raw: "mkdir -p '{{ xp2p_dat_refresh_model.remote_dat_dir }}'"
  changed_when: false

- name: Collect remote XP2P dat file state
  ansible.builtin.raw: |
    file='{{ xp2p_dat_refresh_model.remote_dat_dir }}/{{ item.name }}'
    if [ -s "$file" ]; then
      size="$(wc -c < "$file" | tr -d ' ')"
      checksum="$(md5sum "$file" 2>/dev/null | awk '{print $1}')"
      printf '%s %s\n' "$size" "$checksum"
    fi
  register: xp2p_dat_refresh_remote_dat_sync
  changed_when: false
  loop: "{{ xp2p_dat_refresh_model.dat_files }}"
  loop_control:
    label: "{{ item.name }}"

- name: Copy changed or stale XP2P dat files to router
  ansible.builtin.shell: |
    set -eu
    local_file={{ (xp2p_dat_refresh_cache_dir ~ '/' ~ xp2p_dat_refresh_model.id ~ '/' ~ item.name) | quote }}
    remote_file={{ (xp2p_dat_refresh_model.remote_dat_dir ~ '/' ~ item.name) | quote }}
    remote_tmp="${remote_file}.ansible.$$"
    remote_target={{ ((ansible_user | default('root')) ~ '@' ~ (ansible_host | default(inventory_hostname))) | quote }}
    cat "$local_file" |
      timeout {{ xp2p_dat_refresh_transfer_timeout_seconds | int }} ssh \
        {% for arg in xp2p_dat_refresh_ssh_extra_args %}{{ arg | quote }} {% endfor %}\
        {% if ansible_ssh_private_key_file | default('') | length > 0 %}-i {{ ansible_ssh_private_key_file | quote }} {% endif %}\
        -p {{ ansible_port | default(22) | quote }} \
        "$remote_target" \
        "cat > '$remote_tmp' && mv '$remote_tmp' '$remote_file'"
  loop: "{{ xp2p_dat_refresh_model.dat_files }}"
  loop_control:
    index_var: xp2p_dat_refresh_dat_index
    label: "{{ item.name }}"
  vars:
    xp2p_dat_refresh_remote_parts: "{{ xp2p_dat_refresh_remote_dat_sync.results[xp2p_dat_refresh_dat_index].stdout.split() }}"
    xp2p_dat_refresh_local_stat: "{{ xp2p_dat_refresh_local_dat_sync.results[xp2p_dat_refresh_dat_index].stat }}"
  changed_when: true
  delegate_to: localhost
  when: >-
    xp2p_dat_refresh_force | bool
    or (xp2p_dat_refresh_remote_parts | length) < 2
    or (xp2p_dat_refresh_remote_parts[0] | int) <= 0
    or (xp2p_dat_refresh_remote_parts[0] | int) != (xp2p_dat_refresh_local_stat.size | int)
    or xp2p_dat_refresh_remote_parts[1] != xp2p_dat_refresh_local_stat.checksum

- name: Validate remote XP2P dat files
  ansible.builtin.raw: "test -s '{{ xp2p_dat_refresh_model.remote_dat_dir }}/{{ item.name }}'"
  changed_when: false
  loop: "{{ xp2p_dat_refresh_model.dat_files }}"
  loop_control:
    label: "{{ item.name }}"
