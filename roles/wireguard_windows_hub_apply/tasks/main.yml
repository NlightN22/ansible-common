---
- name: Select Windows WireGuard hub compatibility model
  ansible.builtin.set_fact:
    wireguard_site: >-
      {{
        resolved_wireguard_network
        | combine({
            'hub': resolved_wireguard_network.hub_member,
            'spokes': (
              resolved_wireguard_network.active_peers
              | dict2items
              | map(attribute='value')
              | list
            )
          })
      }}
    wireguard_hub_private_key: "{{ wireguard_windows_hub_private_key }}"
    wireguard_hub_public_key: "{{ wireguard_windows_hub_public_key }}"
    wireguard_windows_staged_config: "{{ wireguard_windows_staging_dir }}\\{{ resolved_wireguard_network.windows_tunnel_name | default(resolved_wireguard_network.interface_name) }}.conf"

- name: Validate Windows hub WireGuard model
  ansible.builtin.assert:
    that:
      - resolved_wireguard_network.current_member.role | default('spoke') == 'hub'
      - wireguard_hub_private_key is not search('CHANGE_ME')
      - resolved_wireguard_network.hub_address | length > 0
      - resolved_wireguard_network.listen_port | int > 0
      - resolved_wireguard_network.active_peers | length > 0
      - resolved_wireguard_network.active_peers | dict2items | map(attribute='value.public_key') | select('defined') | list | length == resolved_wireguard_network.active_peers | length
      - resolved_wireguard_network.windows_backup_dir is defined
      - resolved_wireguard_network.windows_config_dir is defined
    fail_msg: "Windows hub WireGuard model is incomplete."

- name: Ensure Windows WireGuard staging and backup directories exist
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ wireguard_windows_staging_dir }}"
    - "{{ resolved_wireguard_network.windows_backup_dir }}"

- name: Save local WireGuard config backup on Windows
  become: true
  become_method: runas
  become_user: System
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    $backupRoot = '{{ resolved_wireguard_network.windows_backup_dir }}'
    $configRoot = '{{ resolved_wireguard_network.windows_config_dir }}'
    $stamp = Get-Date -Format 'yyyyMMdd-HHmmss'
    $backupPath = Join-Path $backupRoot $stamp
    New-Item -ItemType Directory -Path $backupPath -Force | Out-Null
    if (Test-Path -LiteralPath $configRoot) {
      Copy-Item -LiteralPath $configRoot -Destination $backupPath -Recurse -Force
    }
    [PSCustomObject]@{
      BackupPath = $backupPath
      ConfigRoot = $configRoot
      Exists = Test-Path -LiteralPath $configRoot
    } | ConvertTo-Json -Compress
  register: windows_wireguard_backup
  changed_when: true

- name: Stage Windows WireGuard hub config
  ansible.windows.win_template:
    src: windows-hub.conf.j2
    dest: "{{ wireguard_windows_staged_config }}"
  no_log: true

- name: Recreate Windows WireGuard tunnel service
  become: true
  become_method: runas
  become_user: System
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    $tunnelName = '{{ resolved_wireguard_network.windows_tunnel_name | default(resolved_wireguard_network.interface_name) }}'
    $serviceName = "WireGuardTunnel`$$tunnelName"
    $configPath = '{{ wireguard_windows_staged_config }}'
    $wireGuard = (Get-Command wireguard.exe -ErrorAction Stop).Source
    $existingServices = @(Get-Service -Name $serviceName -ErrorAction SilentlyContinue)
    foreach ($service in $existingServices) {
      if ($service.Status -ne 'Stopped') {
        Stop-Service -Name $service.Name -Force -ErrorAction Stop
      }
      & $wireGuard /uninstalltunnelservice $tunnelName | Out-String
    }
    $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
    if ($service) {
      throw "WireGuard tunnel service $serviceName still exists after uninstall."
    }
    & $wireGuard /installtunnelservice $configPath | Out-String
    Start-Service -Name $serviceName -ErrorAction Stop
    Get-Service -Name $serviceName |
      Select-Object Name, Status, StartType |
      ConvertTo-Json -Compress
  register: windows_wireguard_apply
  changed_when: true

- name: Allow ICMP from WireGuard spokes on Windows
  become: true
  become_method: runas
  become_user: System
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    $ruleName = 'ansible-common-{{ resolved_wireguard_network.id }}-wireguard-icmpv4'
    $remoteAddress = '{{ resolved_wireguard_network.spoke_address_pool }}'
    Get-NetFirewallRule -DisplayName $ruleName -ErrorAction SilentlyContinue |
      Remove-NetFirewallRule
    New-NetFirewallRule `
      -DisplayName $ruleName `
      -Direction Inbound `
      -Action Allow `
      -Protocol ICMPv4 `
      -IcmpType 8 `
      -RemoteAddress $remoteAddress | Out-Null
  register: windows_wireguard_firewall
  changed_when: true
  when: resolved_wireguard_network.spoke_address_pool is defined

- name: Enable weak host behavior for Windows WireGuard interface
  become: true
  become_method: runas
  become_user: System
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    Set-NetIPInterface `
      -InterfaceAlias '{{ resolved_wireguard_network.windows_tunnel_name | default(resolved_wireguard_network.interface_name) }}' `
      -AddressFamily IPv4 `
      -WeakHostReceive Enabled `
      -WeakHostSend Enabled
  register: windows_wireguard_weakhost
  changed_when: true

- name: Check Windows WireGuard runtime state
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Continue'
    $wg = (Get-Command wg.exe -ErrorAction Stop).Source
    [PSCustomObject]@{
      Services = @(Get-Service -Name 'WireGuardTunnel$*' -ErrorAction SilentlyContinue | Select-Object Name, Status, StartType)
      WgShow = (& $wg show | Out-String)
    } | ConvertTo-Json -Depth 4
  register: windows_wireguard_runtime
  changed_when: false
