---
- name: Validate selected Windows WireGuard member
  ansible.builtin.assert:
    that:
      - resolved_wireguard_network is defined
      - resolved_wireguard_network is mapping
      - resolved_wireguard_network.current_member is mapping
      - resolved_wireguard_network.current_member.active | default(true) | bool
      - resolved_wireguard_network.current_member.platform | default('') == 'windows'
      - resolved_wireguard_network.interface_name is defined
    fail_msg: >-
      Host {{ inventory_hostname }} is not an active Windows member of
      WireGuard network {{ network_id | default(resolved_wireguard_network.id | default('unknown')) }}.

- name: Select Windows WireGuard expected runtime contract
  ansible.builtin.set_fact:
    wireguard_windows_tunnel_name: "{{ resolved_wireguard_network.hub_member.windows_tunnel_name | default(resolved_wireguard_network.interface_name) }}"
    wireguard_windows_expected_peers: "{{ resolved_wireguard_network | ansible_common.core.wireguard_expected_peers }}"

- name: Check Windows WireGuard tunnel service and runtime
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    $tunnelName = '{{ wireguard_windows_tunnel_name }}'
    $serviceName = 'WireGuardTunnel${{ wireguard_windows_tunnel_name }}'
    $expectedPeers = '{{ wireguard_windows_expected_peers | to_json }}' | ConvertFrom-Json
    if ($expectedPeers -isnot [array]) {
      $expectedPeers = @($expectedPeers)
    }
    $wg = Get-Command wg.exe -ErrorAction SilentlyContinue
    if (-not $wg) {
      throw 'wg.exe is not available in PATH.'
    }
    $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
    if (-not $service) {
      throw "WireGuard tunnel service $serviceName is missing."
    }
    if ($service.Status -ne 'Running') {
      throw "WireGuard tunnel service $serviceName is $($service.Status), expected Running."
    }
    $dump = & $wg.Source show $tunnelName dump
    if ($LASTEXITCODE -ne 0) {
      throw "wg show $tunnelName dump failed with exit code $LASTEXITCODE."
    }
    $dumpText = $dump -join "`n"
    foreach ($peer in $expectedPeers) {
      $publicKey = [string]$peer.public_key
      $allowedIps = @($peer.allowed_ips) -join ','
      $line = @($dump | Where-Object { $_.StartsWith("$publicKey`t") }) | Select-Object -First 1
      if (-not $line) {
        throw "WireGuard peer $publicKey is missing from $tunnelName."
      }
      if ($line -notlike "*`t$allowedIps`t*") {
        throw "WireGuard peer $publicKey has unexpected AllowedIPs. Expected $allowedIps."
      }
      {% if wireguard_windows_healthcheck_handshake_enabled | bool %}
      $fields = $line -split "`t"
      $latestHandshake = [int64]$fields[4]
      $now = [int64][DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
      if ($latestHandshake -le 0 -or ($now - $latestHandshake) -gt {{ wireguard_windows_healthcheck_handshake_max_age_seconds | int }}) {
        throw "WireGuard peer $publicKey latest handshake is stale."
      }
      {% endif %}
    }
    [PSCustomObject]@{
      TunnelName = $tunnelName
      ServiceName = $serviceName
      ServiceStatus = [string]$service.Status
      ExpectedPeerCount = $expectedPeers.Count
    } | ConvertTo-Json -Compress
  register: windows_wireguard_health
  changed_when: false

- name: Show Windows WireGuard healthcheck summary
  ansible.builtin.debug:
    var: windows_wireguard_health.stdout
