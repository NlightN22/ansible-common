---
- name: Confirm WireGuard apply operation
  ansible.builtin.assert:
    that:
      - wireguard_apply_confirm | bool
    fail_msg: "Set wireguard_apply_confirm=true to apply WireGuard configuration."

- name: Select WireGuard member dispatch context
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_member_context

- name: Run OpenWrt WireGuard apply
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_openwrt_apply
  vars:
    wireguard_openwrt_apply_confirm: "{{ wireguard_apply_confirm }}"
  when: wireguard_member_platform == 'openwrt'

- name: Run OpenWrt WireGuard endpoint failover apply
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_openwrt_endpoint_failover_apply
  when:
    - wireguard_apply_endpoint_failover_enabled | bool
    - wireguard_member_platform == 'openwrt'
    - resolved_wireguard_network.current_member.role | default('spoke') != 'hub'
    - resolved_wireguard_network.endpoint.fallback.enabled | default(false) | bool
    - resolved_wireguard_network.effective_transport.type | default('public') == 'xp2p'
    - resolved_wireguard_network.effective_transport.failover.enabled | default(false) | bool

- name: Run OpenWrt WireGuard endpoint failover healthcheck
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_openwrt_endpoint_failover_healthcheck
  when:
    - wireguard_apply_endpoint_failover_enabled | bool
    - wireguard_member_platform == 'openwrt'
    - resolved_wireguard_network.current_member.role | default('spoke') != 'hub'
    - resolved_wireguard_network.endpoint.fallback.enabled | default(false) | bool
    - resolved_wireguard_network.effective_transport.type | default('public') == 'xp2p'
    - resolved_wireguard_network.effective_transport.failover.enabled | default(false) | bool

- name: Remove stale OpenWrt WireGuard endpoint failover service
  ansible.builtin.raw: |
    service_path='{{ wireguard_endpoint_failover_service_path | default("/etc/init.d/wg-" ~ resolved_wireguard_network.id ~ "-endpoint-failover") }}'
    script_path='{{ wireguard_endpoint_failover_script_path | default("/usr/local/sbin/wg-" ~ resolved_wireguard_network.id ~ "-endpoint-failover") }}'
    endpoint_host='{{ resolved_wireguard_network.endpoint.host }}'
    endpoint_route_section='{{ resolved_wireguard_network.effective_transport.route.section | default("") }}'
    endpoint_host_plain="${endpoint_host%/32}"
    changed=false
    if [ -e "$service_path" ]; then
      if [ -x "$service_path" ]; then
        "$service_path" stop >/dev/null 2>&1 || true
        "$service_path" disable >/dev/null 2>&1 || true
      fi
      rm -f "$service_path"
      changed=true
    fi
    if [ -e "$script_path" ]; then
      rm -f "$script_path"
      changed=true
    fi
    for section in $(uci -q show network | sed -n "s/^\\([^=]*\\)=route$/\\1/p"); do
      target="$(uci -q get "${section}.target" 2>/dev/null || true)"
      if [ "$target" = "$endpoint_host" ] || [ "$target" = "$endpoint_host_plain" ] || [ "${section#network.}" = "$endpoint_route_section" ]; then
        uci -q delete "$section" || true
        changed=true
      fi
    done
    ip route del "${endpoint_host}/32" >/dev/null 2>&1 || true
    ip route del "$endpoint_host" >/dev/null 2>&1 || true
    ip route del "$endpoint_host_plain/32" >/dev/null 2>&1 || true
    ip route del "$endpoint_host_plain" >/dev/null 2>&1 || true
    uci commit network >/dev/null 2>&1 || true
    /etc/init.d/network reload >/dev/null 2>&1 || true
    echo "changed=$changed"
  register: wireguard_apply_stale_endpoint_failover_cleanup
  changed_when: "'changed=true' in wireguard_apply_stale_endpoint_failover_cleanup.stdout"
  when:
    - wireguard_member_platform == 'openwrt'
    - resolved_wireguard_network.current_member.role | default('spoke') != 'hub'
    - resolved_wireguard_network.effective_transport.type | default('public') != 'xp2p' or not (resolved_wireguard_network.effective_transport.failover.enabled | default(false) | bool)

- name: Run Linux WireGuard apply
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_linux_apply
  when: wireguard_member_platform == 'linux'

- name: Run MikroTik WireGuard apply
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_mikrotik_apply
  when: wireguard_member_platform == 'mikrotik'

- name: Run Windows WireGuard hub apply
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_windows_hub_apply
  when:
    - wireguard_member_platform == 'windows'
    - resolved_wireguard_network.current_member.role | default('spoke') == 'hub'

- name: Run Windows WireGuard spoke apply
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_windows_spoke_apply
  when:
    - wireguard_member_platform == 'windows'
    - resolved_wireguard_network.current_member.role | default('spoke') != 'hub'

- name: Handle unsupported WireGuard apply platform
  ansible.builtin.fail:
    msg: >-
      WireGuard apply for platform {{ wireguard_member_platform }} is not
      implemented in ansible_common.core yet.
  when:
    - wireguard_member_platform not in wireguard_dispatch_supported_platforms
    - wireguard_dispatch_unsupported_platform_policy == 'fail'

- name: Skip unsupported WireGuard apply platform
  ansible.builtin.debug:
    msg: "Skipping unsupported WireGuard apply platform {{ wireguard_member_platform }}."
  when:
    - wireguard_member_platform not in wireguard_dispatch_supported_platforms
    - wireguard_dispatch_unsupported_platform_policy == 'skip'
