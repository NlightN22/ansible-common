---
- name: Validate architecture model before normalization
  ansible.builtin.include_role:
    name: ansible_common.core.model_validate

- name: Publish normalized architecture model
  ansible.builtin.set_fact:
    "{{ architecture_model_normalized_var }}": >-
      {{
        architecture_model
        | ansible_common.core.architecture_normalize
      }}

- name: Publish selected WireGuard network view
  ansible.builtin.set_fact:
    resolved_wireguard_network: >-
      {{
        lookup('ansible.builtin.vars', architecture_model_normalized_var)
        | ansible_common.core.architecture_wireguard_view(network_id, inventory_hostname)
      }}
  when:
    - network_id is defined
    - (lookup('ansible.builtin.vars', architecture_model_normalized_var)).networks.get(network_id, {}).type | default('') == 'wireguard'
