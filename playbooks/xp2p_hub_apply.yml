---
- name: Apply XP2P hub members
  hosts: "{{ target_group | mandatory }}"
  gather_facts: false

  pre_tasks:
    - name: Load architecture model
      ansible.builtin.include_role:
        name: ansible_common.core.model_load

    - name: Normalize architecture model
      ansible.builtin.include_role:
        name: ansible_common.core.model_normalize

    - name: Skip non-hub hosts for this XP2P network
      ansible.builtin.meta: end_host
      when: resolved_xp2p_network.current_member.role | default('') != 'hub'

  roles:
    - role: ansible_common.core.xp2p_apply
