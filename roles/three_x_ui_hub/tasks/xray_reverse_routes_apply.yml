---
- name: Build 3x-ui Xray reverse routing spec
  ansible.builtin.include_tasks: xray_reverse_routes_spec.yml

- name: Apply 3x-ui Xray reverse portals and routes
  ansible_common.core.three_x_ui_xray_apply:
    panel_url: "{{ three_x_ui_hub_panel_url }}"
    username: "{{ three_x_ui_hub_panel_username }}"
    password: "{{ three_x_ui_hub_panel_password }}"
    verify_tls: "{{ three_x_ui_hub_panel_validate_certs | bool }}"
    timeout: 20
    spec:
      reverse_portals: "{{ three_x_ui_hub_xray_reverse_portals }}"
      routes: "{{ three_x_ui_hub_xray_routes }}"
  register: three_x_ui_hub_xray_apply
  no_log: true
  delegate_to: "{{ three_x_ui_hub_panel_api_delegate_to }}"
  when: three_x_ui_hub_xray_reverse_portals | length > 0

- name: Report 3x-ui Xray reverse routing result
  ansible.builtin.debug:
    msg: >-
      3x-ui star {{ three_x_ui_hub_star.id }} on {{ inventory_hostname }}:
      reverse portals/routes changed={{ three_x_ui_hub_xray_apply.changed | default(false) }},
      portals added={{ three_x_ui_hub_xray_apply.portals_added | default(0) }},
      routes added={{ three_x_ui_hub_xray_apply.routes_added | default(0) }}.
  when: three_x_ui_hub_xray_apply is defined
