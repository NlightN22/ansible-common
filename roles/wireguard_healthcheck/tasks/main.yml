---
- name: Select WireGuard member dispatch context
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_member_context

- name: Run OpenWrt WireGuard healthcheck
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_openwrt_healthcheck
  when: wireguard_member_platform == 'openwrt'

- name: Run OpenWrt WireGuard endpoint failover healthcheck
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_openwrt_endpoint_failover_healthcheck
  when:
    - wireguard_healthcheck_endpoint_failover_enabled | bool
    - wireguard_member_platform == 'openwrt'
    - resolved_wireguard_network.current_member.role | default('spoke') != 'hub'
    - resolved_wireguard_network.endpoint.fallback.enabled | default(false) | bool
    - resolved_wireguard_network.preferred_transport.type | default('public') == 'xp2p'
    - resolved_wireguard_network.preferred_transport.failover.enabled | default(false) | bool

- name: Run Linux WireGuard healthcheck
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_linux_healthcheck
  when: wireguard_member_platform == 'linux'

- name: Run MikroTik WireGuard healthcheck
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_mikrotik_healthcheck
  vars:
    mikrotik_wireguard_verify_reachability_enabled: "{{ wireguard_mikrotik_verify_reachability_enabled | default(true) }}"
  when: wireguard_member_platform == 'mikrotik'

- name: Run Windows WireGuard healthcheck
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_windows_healthcheck
  when: wireguard_member_platform == 'windows'

- name: Handle unsupported WireGuard healthcheck platform
  ansible.builtin.fail:
    msg: >-
      WireGuard healthcheck for platform {{ wireguard_member_platform }} is not
      implemented in ansible_common.core yet.
  when:
    - wireguard_member_platform not in wireguard_dispatch_supported_platforms
    - wireguard_dispatch_unsupported_platform_policy == 'fail'

- name: Skip unsupported WireGuard healthcheck platform
  ansible.builtin.debug:
    msg: "Skipping unsupported WireGuard healthcheck platform {{ wireguard_member_platform }}."
  when:
    - wireguard_member_platform not in wireguard_dispatch_supported_platforms
    - wireguard_dispatch_unsupported_platform_policy == 'skip'
