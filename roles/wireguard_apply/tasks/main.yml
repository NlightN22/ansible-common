---
- name: Confirm WireGuard apply operation
  ansible.builtin.assert:
    that:
      - wireguard_apply_confirm | bool
    fail_msg: "Set wireguard_apply_confirm=true to apply WireGuard configuration."

- name: Select WireGuard member dispatch context
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_member_context

- name: Run OpenWrt WireGuard apply
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_openwrt_apply
  vars:
    wireguard_openwrt_apply_confirm: "{{ wireguard_apply_confirm }}"
  when: wireguard_member_platform == 'openwrt'

- name: Run OpenWrt WireGuard endpoint failover apply
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_openwrt_endpoint_failover_apply
  when:
    - wireguard_apply_endpoint_failover_enabled | bool
    - wireguard_member_platform == 'openwrt'
    - resolved_wireguard_network.current_member.role | default('spoke') != 'hub'
    - resolved_wireguard_network.endpoint.fallback.enabled | default(false) | bool
    - resolved_wireguard_network.effective_transport.type | default('public') == 'xp2p'
    - resolved_wireguard_network.effective_transport.failover.enabled | default(false) | bool

- name: Run Linux WireGuard apply
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_linux_apply
  when: wireguard_member_platform == 'linux'

- name: Run MikroTik WireGuard apply
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_mikrotik_apply
  when: wireguard_member_platform == 'mikrotik'

- name: Run Windows WireGuard hub apply
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_windows_hub_apply
  when:
    - wireguard_member_platform == 'windows'
    - resolved_wireguard_network.current_member.role | default('spoke') == 'hub'

- name: Run Windows WireGuard spoke apply
  ansible.builtin.include_role:
    name: ansible_common.core.wireguard_windows_spoke_apply
  when:
    - wireguard_member_platform == 'windows'
    - resolved_wireguard_network.current_member.role | default('spoke') != 'hub'

- name: Handle unsupported WireGuard apply platform
  ansible.builtin.fail:
    msg: >-
      WireGuard apply for platform {{ wireguard_member_platform }} is not
      implemented in ansible_common.core yet.
  when:
    - wireguard_member_platform not in wireguard_dispatch_supported_platforms
    - wireguard_dispatch_unsupported_platform_policy == 'fail'

- name: Skip unsupported WireGuard apply platform
  ansible.builtin.debug:
    msg: "Skipping unsupported WireGuard apply platform {{ wireguard_member_platform }}."
  when:
    - wireguard_member_platform not in wireguard_dispatch_supported_platforms
    - wireguard_dispatch_unsupported_platform_policy == 'skip'
